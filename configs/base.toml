experiment_name = "qwen35-pokemon-red"
seed = 17
rom_path = "PokemonRed.gb"
init_state_path = "assets/init_game.state"
map_data_path = "assets/map_data.json"
output_dir = "outputs/qwen35-pokemon-red"
device = "cuda"
dtype = "bfloat16"

[model]
model_name_or_path = "Qwen/Qwen3.5-0.8B"
trust_remote_code = true
use_lora = true
lora_r = 32
lora_alpha = 64
lora_dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
max_prompt_tokens = 1536
max_new_tokens = 160
temperature = 0.7
top_p = 0.95
repetition_penalty = 1.02

[env]
headless = true
downsample_factor = 8
grayscale_buckets = 16
action_hold_frames = 8
frames_per_button = 3
max_buttons_per_turn = 8
initial_round_horizon = 500

[[env.horizon_schedule]]
until_update = 250
rounds = 500

[[env.horizon_schedule]]
until_update = 750
rounds = 750

[[env.horizon_schedule]]
until_update = 2000
rounds = 1000

[[env.horizon_schedule]]
until_update = 1000000
rounds = 1500

[env.reward]
unique_tile_weight = 0.05
event_flag_weight = 2.0
format_penalty = -0.2
noop_penalty = -0.02
repeated_action_penalty = -0.01

[train]
group_size = 16
parallel_envs = 16
updates = 2000
rollout_rounds_per_update = 64
gamma = 0.995
ppo_epochs = 2
minibatch_size = 4
learning_rate = 5.0e-6
weight_decay = 0.01
warmup_ratio = 0.03
grad_clip_norm = 1.0
ppo_clip_epsilon = 0.2
kl_beta = 0.02
entropy_beta = 0.001
gradient_accumulation_steps = 1
log_every_updates = 5
save_every_updates = 50
eval_every_updates = 50

[logging]
use_tensorboard = true
use_wandb = false
wandb_project = "poke-llm-rl"
